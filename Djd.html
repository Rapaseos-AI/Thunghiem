<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>G-II AI 10/10 Perfect Layout</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

        /* ========================================= */
        /* BIẾN CHUNG: PASTEL NEON & HERO            */
        /* ========================================= */
        :root {
            --radius-pill: 22px;
            --radius-card: 16px;
            --text-shadow: 0 1px 2px rgba(0,0,0,0.12);
            --btn-shadow: 0 8px 20px rgba(0,0,0,0.15);
            --btn-hover-factor: 1.05;
            --glass-stroke: rgba(255,255,255,0.15);
            --font-weight: 700;

            --hero-h: 62vh;
            --c1-start: #3A0CA3;
            --c1-mid:   #4361EE;
            --c1-acc:   #4CC9F0;
            --c2-pink:  #FF70A6;
            --c2-lilac: #C77DFF;
            --orb-c:    #9BF6FF;
            --bg-base:  #1F1543;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif;
            -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent;
        }

        input[type="text"] {
            -webkit-user-select: auto;
            user-select: auto;
        }

        body {
            background-color: #06020c; display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }

        /* --- CONTAINER --- */
        .app-container {
            width: 100%; max-width: 480px; height: 100vh;
            background-color: var(--bg-base);
            background-image: linear-gradient(180deg, rgba(76,201,240,0.04), rgba(199,125,255,0.08));
            position: relative; display: flex; flex-direction: column; color: white;
            box-shadow: 0 0 50px rgba(0,0,0,0.8); overflow: hidden;
        }

        /* ========================================= */
        /* HERO BACKGROUND (VŨ TRỤ ĐỈNH KOUT)        */
        /* ========================================= */
        .bg-hero {
            position: absolute; top: -12px; left: 0; width: 100%; height: var(--hero-h);
            overflow: hidden; z-index: 6; pointer-events: none;
            mask-image: linear-gradient(to bottom, black 65%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 65%, transparent 100%);
        }

        .hero-vignette {
            position: absolute; inset: 0;
            background: radial-gradient(60% 40% at 50% 35%, rgba(255,255,255,0.02), transparent 40%),
                        radial-gradient(100% 100% at 50% 100%, rgba(0,0,0,0.12), transparent 50%);
            pointer-events: none; z-index: 6;
        }

        .hero-gradient {
            position: absolute; inset: 0;
            background: linear-gradient(120deg, var(--c1-start), var(--c1-mid), var(--c2-lilac));
            background-size: 300% 300%; filter: saturate(1.1);
            animation: gradMove 12s ease infinite; mix-blend-mode: normal; z-index: 1;
        }
        @keyframes gradMove { 0%{background-position:0% 50%;} 50%{background-position:100% 50%;} 100%{background-position:0% 50%;} }

        .wave { position: absolute; left: 0; width: 100%; height: 50%; bottom: 0; fill: none; z-index: 5; }
        .wave path { filter: drop-shadow(0 6px 18px rgba(76,201,240,0.18)) drop-shadow(0 2px 6px rgba(199,125,255,0.12)); stroke-linecap: round; }
        .wave-1 path { opacity: 0.95; }
        .wave-2 path { opacity: 0.8; }
        .wave-1 { transform-origin: center; animation: waveMove1 8s linear infinite alternate; }
        .wave-2 { transform-origin: center; animation: waveMove2 10s linear infinite alternate-reverse; }
        @keyframes waveMove1 { from{transform:translateX(-30px)} to{transform:translateX(30px)} }
        @keyframes waveMove2 { from{transform:translateX(20px)} to{transform:translateX(-20px)} }

        .orb {
            position: absolute; right: 10%; top: 30%; width: 130px; height: 130px; border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.85), rgba(156,246,255,0.65) 18%, rgba(255,112,166,0.2) 45%, transparent 60%);
            filter: blur(22px) saturate(1.15);
            box-shadow: 0 18px 60px rgba(199,125,255,0.18), inset 0 -8px 24px rgba(76,201,240,0.08);
            mix-blend-mode: screen; z-index: 7; animation: orbMove 14s ease-in-out infinite; pointer-events: none;
        }
        @keyframes orbMove { 0%{transform: translate(0,0) scale(1);} 50%{transform: translate(-25px,-15px) scale(1.1);} 100%{transform: translate(0,0) scale(1);} }

        .hero-glow {
            position: absolute; left: 0; right: 0; bottom: 8%; height: 160px;
            background: radial-gradient(50% 40% at 50% 40%, rgba(76,201,240,0.25), rgba(199,125,255,0.20) 35%, transparent 70%);
            filter: blur(36px); pointer-events: none; mix-blend-mode: screen; z-index: 7;
        }

        .hero-top-light {
            position: absolute; top: -40px; left: 50%; transform: translateX(-50%); width: 300px; height: 200px;
            background: radial-gradient(circle, rgba(255,255,255,0.18), transparent 70%);
            filter: blur(60px); z-index: 1; pointer-events: none;
        }

        .particles { position: absolute; inset: 0; width: 100%; height: 100%; mix-blend-mode: screen; z-index: 5; pointer-events: none; }
        .noise { position: absolute; inset: 0; background-image: radial-gradient(circle at 20% 20%, rgba(255,255,255,0.03), transparent 20%), linear-gradient(rgba(0,0,0,0.02), rgba(255,255,255,0.00)); opacity: 0.85; z-index: 6; pointer-events: none; }

        @media (max-width: 720px), (prefers-reduced-motion: reduce) {
            :root { --hero-h: 55vh; }
            .hero-glow, .wave path, .orb { filter: none !important; mix-blend-mode: normal !important; }
            .orb { opacity: 0.85; box-shadow: none; }
            .hero-gradient, .wave, .orb { animation: none; }
        }
        .no-blend .hero-glow { mix-blend-mode: normal; opacity: 0.6; }

        /* ========================================= */
        /* UI LAYER: CẤU TRÚC KHOÁ CUỘN CHUẨN XỊN    */
        /* ========================================= */
        .ui-layer {
            position: relative; z-index: 10; width: 100%; height: 100%;
            display: flex; flex-direction: column; 
            overflow: hidden; /* Tuyệt đối không cho cuộn cả trang */
        }

        /* --- HEADER --- */
        .header {
            display: flex; justify-content: flex-start; align-items: center; padding: 15px 10px; gap: 12px;
            overflow-x: auto; -webkit-overflow-scrolling: touch; flex-shrink: 0; position: relative; z-index: 15;
        }
        .header::-webkit-scrollbar { display: none; }
        .header-left { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
        
        .avatar-icon {
            width: 26px; height: 26px; background: linear-gradient(135deg, rgba(255,255,255,0.2), rgba(255,255,255,0.05));
            backdrop-filter: blur(5px); border: 1px solid var(--glass-stroke); border-radius: 50%;
            display: flex; justify-content: center; align-items: center; flex-shrink: 0; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .avatar-icon svg { width: 14px; height: 14px; }

        .btn-small {
            background: rgba(255,255,255,0.1); backdrop-filter: blur(8px); border: 1px solid var(--glass-stroke); color: white;
            padding: 6px 14px; border-radius: var(--radius-pill); font-size: 12px; font-weight: var(--font-weight);
            white-space: nowrap; flex-shrink: 0; cursor: pointer; text-shadow: var(--text-shadow); transition: all 0.2s;
        }
        .btn-connect { background: linear-gradient(90deg, #9D4EDD, #C77DFF); box-shadow: 0 4px 15px rgba(199,125,255,0.3); }
        .btn-apikey { display: flex; align-items: center; gap: 5px; background: linear-gradient(90deg, #4CC9F0, #7BDFF2); box-shadow: 0 4px 15px rgba(76,201,240,0.3); margin-right: 5px; color: black !important;}
        .btn-apikey svg { width: 12px; height: 12px; fill: black;}

        .nav-toggle { display: flex; background: rgba(0, 0, 0, 0.2); backdrop-filter: blur(5px); border-radius: var(--radius-pill); border: 1px solid var(--glass-stroke); flex-shrink: 0; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .nav-item {
            padding: 6px 14px; font-size: 12px; font-weight: var(--font-weight); white-space: nowrap;
            cursor: pointer; border-radius: var(--radius-pill); color: rgba(255,255,255,0.7); transition: all 0.3s ease;
        }
        .nav-item.active { color: white; box-shadow: 0 0 10px rgba(255,255,255,0.2); text-shadow: var(--text-shadow); }
        .nav-item#tab-home.active { background: linear-gradient(90deg, #C77DFF, #9D4EDD); }
        .nav-item#tab-chat.active { background: linear-gradient(90deg, #7BDFF2, #4CC9F0); }

        /* --- MAIN CONTENT VÙNG CHỨA VIEWS --- */
        .content-body {
            flex-grow: 1; display: flex; flex-direction: column; position: relative; z-index: 10;
            overflow: hidden; /* Let inner views handle scroll */
        }
        
        /* ====== VIEW 1: TRANG CHỦ ====== */
        #view-home { 
            display: flex; flex-direction: column; flex-grow: 1; 
            padding: 0 10px 20px 10px;
            overflow-y: auto; /* Chỉ trang chủ được phép cuộn */
            overflow-x: hidden;
        }
        #view-home::-webkit-scrollbar { width: 0; }
        .home-spacer { height: 20vh; min-height: 130px; flex-shrink: 0; } 

        /* ========================================= */
        /* TÍNH NĂNG 1: NÚT BẤM NHẢY CẪNG LÊN        */
        /* ========================================= */
        .category-tabs { display: flex; justify-content: space-between; gap: 6px; width: 100%; margin-bottom: 25px; flex-shrink: 0;}
        .cat-btn {
            padding: 10px 0; border-radius: var(--radius-pill); font-weight: 800; font-size: 13px; color: #FFFFFF;
            text-align: center; flex: 1; white-space: nowrap; text-shadow: var(--text-shadow); box-shadow: var(--btn-shadow);
            border: 1px solid rgba(255,255,255,0.2); transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.2s ease; 
            cursor: pointer;
        }
        .cat-btn:hover { transform: translateY(-4px); filter: brightness(var(--btn-hover-factor)); }
        
        /* Class kích hoạt nhún lên giữ vị trí */
        .cat-btn.popped-up {
            transform: translateY(-10px) !important; /* Trồi lên rõ ràng luôn */
            filter: brightness(1.2) !important;
            box-shadow: 0 15px 25px rgba(0,0,0,0.3) !important;
            border: 1px solid rgba(255,255,255,0.6);
        }

        .cat-gii { background: linear-gradient(135deg, #C77DFF, #9D4EDD); }
        .cat-imetal { background: linear-gradient(135deg, #7BDFF2, #4CC9F0); color: black !important; text-shadow: none !important;}
        .cat-vip { background: linear-gradient(135deg, #80FFDB, #48BFE3); color: black !important; text-shadow: none !important;}
        .cat-cyh { background: linear-gradient(135deg, #FFAFCC, #FF70A6); color: black !important; text-shadow: none !important;}

        /* THANH NHẬP LIỆU (Giữ nút luôn tròn) */
        .icon-btn, .send-btn {
            flex-shrink: 0 !important; min-width: 34px !important; min-height: 34px !important;
            width: 34px; height: 34px; border-radius: 50%; display: flex; justify-content: center; align-items: center;
            border: 1px solid rgba(255,255,255,0.4); cursor: pointer; transition: 0.2s; aspect-ratio: 1 / 1; padding: 0;
        }
        .icon-btn svg, .send-btn svg { width: 16px; height: 16px; flex-shrink: 0; }
        .icon-btn:hover, .send-btn:hover { transform: scale(1.1); }
        .icon-plus { background: linear-gradient(135deg, #7BDFF2, #4CC9F0); color: white; font-size: 20px; font-weight: bold; border:none;}
        .icon-up { background: linear-gradient(135deg, #4CC9F0, #7BDFF2); border:none;}
        .send-btn { background: linear-gradient(135deg, #7BDFF2, #4CC9F0); border:none;}

        .input-bar-container, .chat-input-box {
            width: 100%; height: 48px; background: rgba(0, 0, 0, 0.2); backdrop-filter: blur(10px);
            border-radius: var(--radius-pill); border: 1px solid var(--glass-stroke); box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            display: flex; align-items: center; justify-content: space-between; padding: 0 8px; gap: 10px; flex-shrink: 0;
        }
        .input-bar-container { margin-bottom: 30px; background: rgba(255, 255, 255, 0.05); }
        .input-bar-container input, .chat-input-box input {
            flex-grow: 1; background: transparent; border: none; outline: none; color: white; font-size: 14px; padding: 0; height: 100%; min-width: 0;
        }
        .input-bar-container input::placeholder, .chat-input-box input::placeholder { color: rgba(255,255,255,0.6); }

        /* MODEL CARDS */
        .models-area { display: flex; flex-direction: column; gap: 15px; width: 100%; position: relative; z-index: 10; flex-shrink: 0;}
        .row-scrollable { display: flex; gap: 10px; width: 100%; overflow-x: auto; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; padding-bottom: 5px; }
        .row-scrollable::-webkit-scrollbar { display: none; }
        .row-scrollable .model-card { flex: 0 0 28%; scroll-snap-align: start; min-height: 115px; }
        .row-fixed { display: flex; justify-content: space-between; gap: 6px; width: 100%; }
        .row-fixed .model-card { flex: 1; min-height: 115px; }

        .model-card {
            border-radius: var(--radius-card); padding: 12px 4px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; color: #FFFFFF; font-weight: 800; box-shadow: var(--btn-shadow); border: 1px solid rgba(255,255,255,0.2);
            transition: transform 0.16s ease, filter 0.12s ease; cursor: pointer; text-shadow: 0 2px 0 rgba(0,0,0,0.10);
        }
        .model-card:hover { transform: translateY(-6px); filter: brightness(var(--btn-hover-factor)); }
        .model-card:active { transform: translateY(0); filter: brightness(0.95); }
        .card-title { font-size: 11px; margin-bottom: 6px; word-wrap: break-word; line-height: 1.2; }
        .card-subtitle { font-size: 9px; opacity: 0.95; font-weight: 700; }

        .bg-1 { background: linear-gradient(180deg, #A9D6FF, #72B6FF); } 
        .bg-2 { background: linear-gradient(180deg, #E0AAFF, #C77DFF); } 
        .bg-3 { background: linear-gradient(180deg, #FFF3B0, #FFE066); } 
        .bg-3 .card-title, .bg-3 .card-subtitle { color: #061018; text-shadow: 0 2px 0 rgba(255,255,255,0.85); font-weight: 800; }
        .bg-4 { background: linear-gradient(180deg, #9BF6FF, #64DFDF); } 
        .bg-5 { background: linear-gradient(180deg, #FFD6A5, #FFAD60); } 
        .bg-6 { background: linear-gradient(180deg, #B8C0FF, #8E9BFF); } 
        .bg-7 { background: linear-gradient(180deg, #B9FBC0, #7AE582); } 
        .bg-8 { background: linear-gradient(180deg, #CAF0F8, #90DBF4); } 
        .bg-9 { background: linear-gradient(180deg, #FF99C8, #FF70A6); } 

        /* ========================================= */
        /* TÍNH NĂNG 2: GIAO DIỆN CHAT KHÓA ĐÁY      */
        /* ========================================= */
        #view-chat { 
            display: none; 
            flex-direction: column; 
            flex-grow: 1; /* Chiếm toàn bộ phần còn lại của màn hình */
            overflow: hidden; /* Khóa cuộn tổng thể của trang chat */
            padding: 0 10px 15px 10px;
        }

        /* Vùng tin nhắn được phép cuộn độc lập */
        .chat-history { 
            flex-grow: 1; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            padding: 10px 5px; 
            overflow-y: auto; /* Chỉ cuộn lịch sử chat */
            scroll-behavior: smooth; 
        }
        .chat-history::-webkit-scrollbar { width: 0; }
        
        .msg-bubble { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.4; box-shadow: 0 4px 15px rgba(0,0,0,0.1); animation: fadeIn 0.3s ease; word-wrap: break-word;}
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .msg-ai { align-self: flex-start; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid var(--glass-stroke); border-bottom-left-radius: 4px; }
        .msg-user { align-self: flex-end; background: linear-gradient(135deg, #C77DFF, #9D4EDD); border-bottom-right-radius: 4px; }
        
        /* Khung nhập liệu bám dính đáy màn hình (Không bị đẩy đi) */
        .chat-input-wrapper { 
            flex-shrink: 0; /* Cấm co lại */
            margin-top: 10px; 
            padding-bottom: 5px;
        }

    </style>
</head>
<body>

    <div class="app-container">
        <!-- BACKGROUND HERO 10/10 -->
        <div class="hero-top-light"></div>
        <div class="hero-glow"></div>
        <div class="bg-hero" aria-hidden="true">
            <div class="hero-gradient"></div>
            <div class="hero-vignette"></div>
            
            <svg class="wave wave-1" viewBox="0 0 1440 200" preserveAspectRatio="none">
                <defs><linearGradient id="gw1" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#4CC9F0" stop-opacity="1"/><stop offset="60%" stop-color="#C77DFF" stop-opacity="0.95"/><stop offset="100%" stop-color="#FF70A6" stop-opacity="0.8"/></linearGradient></defs>
                <path stroke="url(#gw1)" stroke-width="3" d="M0,120 C300,40 600,200 900,120 1200,40 1440,160 1440,160" />
            </svg>
            <svg class="wave wave-2" viewBox="0 0 1440 200" preserveAspectRatio="none">
                <defs><linearGradient id="gw2" x1="100%" y1="0%" x2="0%" y2="0%"><stop offset="0%" stop-color="#FF70A6" stop-opacity="1"/><stop offset="100%" stop-color="#4CC9F0" stop-opacity="0.8"/></linearGradient></defs>
                <path stroke="url(#gw2)" stroke-width="3" d="M0,140 C360,80 720,20 1080,120 1320,180 1440,100 1440,100" />
            </svg>

            <div class="orb"></div>
            <canvas id="hero-particles" class="particles"></canvas>
            <div class="noise"></div>
        </div>

        <!-- LAYER NỘI DUNG GIAO DIỆN -->
        <div class="ui-layer">
            
            <!-- HEADER -->
            <div class="header">
                <div class="header-left">
                    <div class="avatar-icon">
                        <svg viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
                    </div>
                    <div class="btn-small btn-connect">Kết nối</div>
                </div>
                <div class="nav-toggle">
                    <div id="tab-home" class="nav-item active">Trang chủ</div>
                    <div id="tab-chat" class="nav-item">Khung chat</div>
                </div>
                <div class="btn-small btn-apikey">
                    <svg viewBox="0 0 24 24" fill="black"><path d="M12.65 10C11.83 7.67 9.61 6 7 6c-3.31 0-6 2.69-6 6s2.69 6 6 6c2.61 0 4.83-1.67 5.65-4H17v4h4v-4h2v-4H12.65zM7 14c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"/></svg> API Key
                </div>
            </div>

            <!-- MAIN CONTENT -->
            <div class="content-body">
                
                <!-- VIEW TRANG CHỦ -->
                <div id="view-home">
                    <div class="home-spacer"></div>

                    <!-- Các nút tương tác nhún nhảy -->
                    <div class="category-tabs">
                        <div class="cat-btn cat-gii" id="cat-gii">G-II</div>
                        <div class="cat-btn cat-imetal" id="cat-imetal" style="color: black; text-shadow:none;">Imetal</div>
                        <div class="cat-btn cat-vip" id="cat-vip" style="color: black; text-shadow:none;">VIP</div>
                        <div class="cat-btn cat-cyh" id="cat-cyh" style="color: black; text-shadow:none;">CYH</div>
                    </div>

                    <!-- Nhập liệu -->
                    <div class="input-bar-container">
                        <div class="icon-btn icon-plus">+</div>
                        <input type="text" id="input-home" placeholder="Hỏi G-II bất cứ điều gì...">
                        <div class="icon-btn icon-up" id="btn-send-home">
                            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
                        </div>
                    </div>

                    <!-- AI CARDS -->
                    <div class="models-area">
                        <div class="row-scrollable">
                            <div class="model-card bg-1"><div class="card-title">Viết Lách</div><div class="card-subtitle">Qwen 3 32B</div></div>
                            <div class="model-card bg-2"><div class="card-title">Viết Code</div><div class="card-subtitle">GPT-OSS 120B</div></div>
                            <div class="model-card bg-3"><div class="card-title">Suy luận</div><div class="card-subtitle">Qwen3 VL<br>Thinking</div></div>
                            <div class="model-card bg-4"><div class="card-title">Đọc tài liệu</div><div class="card-subtitle">Nemotron 3</div></div>
                            <div class="model-card bg-5"><div class="card-title">Logic</div><div class="card-subtitle">GPT-OSS 120B</div></div>
                        </div>
                        <div class="row-fixed">
                            <div class="model-card bg-6"><div class="card-title">Phân tích<br>tài liệu</div><div class="card-subtitle">Kimi K2</div></div>
                            <div class="model-card bg-7"><div class="card-title">Trò chuyện</div><div class="card-subtitle">Llama 3.1</div></div>
                            <div class="model-card bg-8"><div class="card-title">Trợ lý<br>đa năng</div><div class="card-subtitle">Gemini 2.5</div></div>
                            <div class="model-card bg-9"><div class="card-title">Nói chuyện<br>vui</div><div class="card-subtitle">CYH-AI</div></div>
                        </div>
                    </div>
                </div>

                <!-- VIEW KHUNG CHAT (Khóa cứng Input đáy) -->
                <div id="view-chat">
                    <div class="chat-history" id="chat-history-box">
                        <!-- JS nhả chữ vào đây -->
                    </div>

                    <!-- THANH NHẬP LIỆU (LUÔN CỐ ĐỊNH Ở ĐÁY CHAT) -->
                    <div class="chat-input-wrapper">
                        <div class="chat-input-box">
                            <div class="icon-btn icon-plus">+</div>
                            <input type="text" id="input-chat" placeholder="Nhắn tin cho G-II AI...">

        // Tab Switcher Mượt Mà

                if(tabHome) tabHome.classList.add('active');

            [btnGii, btnImetal, btnVip, btnCyh].forEach(b => { if(b) b.classList.remove('popped-up'); });
        }

        function toggleMenu(btn, menuId) {
            const menu = document.getElementById(menuId);
            if (!menu) return;
            const isOpening = !menu.classList.contains('show');

            if(isOpening) {
                menu.classList.add('show'); 
                if(overlay) overlay.classList.add('show');

        // Click Cards nhanh (9 cái dưới cùng)

        // ==========================================
        // 4. BỘ LOA GOOGLE TTS x1.5 (Y CHANG CỦA SẾP)
        // ==========================================
        let audioQueue = [];
        let isPlaying = false;
        let currentBtn = null;

        function resetAllBtns() {
            document.querySelectorAll('.speak-btn').forEach(b => {
                b.classList.remove('playing', 'error');
                b.innerHTML = `<i data-lucide="volume-2" style="width:14px;"></i> Đọc tiếng x1.5`;
            });
            if (typeof lucide !== 'undefined') lucide.createIcons();
        }

        function playNextChunk() {
            if (audioQueue.length === 0 || !isPlaying) {
                isPlaying = false;
                resetAllBtns();
                return;
            }
            let textChunk = audioQueue.shift();
            // CHÚ Ý: Đã thay đổi thành tw-ob để Acode không chặn
            masterPlayer.src = `https://translate.googleapis.com/translate_tts?ie=UTF-8&tl=vi-VN&client=tw-ob&q=${encodeURIComponent(textChunk)}`;
            masterPlayer.playbackRate = 1.5;
            masterPlayer.play().catch(() => {
                isPlaying = false;
                if (currentBtn) {
                    currentBtn.classList.remove('playing');
                    currentBtn.classList.add('error');
                    currentBtn.innerHTML = `<i data-lucide="volume-x" style="width:14px;"></i> Lỗi loa`;
                    if (typeof lucide !== 'undefined') lucide.createIcons();
                }
            });
        }

        if(masterPlayer) {
            masterPlayer.onended = () => { if (isPlaying) playNextChunk(); };
            masterPlayer.onerror = () => { if (isPlaying) playNextChunk(); };
        }

        window.speakText = function(btnElement, encodedText) {
            if (isPlaying && currentBtn === btnElement) {
                masterPlayer.pause();
                audioQueue = [];
                isPlaying = false;
                resetAllBtns();
                return;
            }
            resetAllBtns();
            currentBtn = btnElement;
            isPlaying = true;
            if (btnElement) {
                btnElement.classList.add('playing');
                btnElement.innerHTML = `<i data-lucide="square" style="width:14px;"></i> Dừng đọc`;
                if (typeof lucide !== 'undefined') lucide.createIcons();
            }

            let safeText = decodeURIComponent(encodedText).replace(/[#&%*~^\/\\<>]/g, ' ');
            let words = safeText.split(' ');
            audioQueue = [];
            let temp = '';
            words.forEach(w => {
                if ((temp + w).length > 130) {
                    audioQueue.push(temp.trim() + '.');
                    temp = w + ' ';
                } else {
                    temp += w + ' ';
                }
            });
            if (temp.trim()) audioQueue.push(temp.trim() + '.');
            playNextChunk();
        };

        window.stopSpeaking = function() {
            masterPlayer.pause();
            audioQueue = [];
            isPlaying = false;
            resetAllBtns();
        };


        // --- RENDER CHAT ---
        const chatBox = document.getElementById('chat-history-box');
        function scrollToBottom() { if(chatBox) chatBox.scrollTop = chatBox.scrollHeight; }

        function renderChat() {
            if(!chatBox) return;
            chatBox.innerHTML = '';
            messages.forEach((m) => {
                const div = document.createElement('div');
                div.className = `msg-bubble ${m.role === 'user' ? 'msg-user' : 'msg-ai'}`;
                let html = m.content.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\*\*(.*?)\*\*/g, '<b>$1</b>').replace(/\n/g, '<br>');
                
                // Gắn Nút Loa Code 1 của Sếp
                if(m.role === 'assistant') {
                    const encoded = encodeURIComponent(m.content.replace(/\*\*/g, ''));

                    html += `<div><button class="speak-btn" onclick="window.speakText(this, '${encoded}')"><i data-lucide="volume-2" style="width:14px;"></i> Đọc tiếng x1.5</button></div>`;
                }
                div.innerHTML = html;
                chatBox.appendChild(div);
            });
            if (typeof lucide !== 'undefined') lucide.createIcons();
            scrollToBottom();

        const btnSendChat = document.getElementById('btn-send-chat');
        const inpChat = document.getElementById('input-chat');

        const fetchWithTimeout = async (url, options = {}, timeout = 25000) => { const controller = new AbortController(); const id = setTimeout(() => controller.abort(), timeout); try { const response = await fetch(url, { ...options, signal: controller.signal }); clearTimeout(id); if (!response.ok) throw new Error(`Lỗi Server ${response.status}`); return response; } catch (error) { clearTimeout(id); throw error; } };

        async function processMessage(text) {
            if(!text) return;
            messages.push({ role: 'user', content: text });
            goTab('chat');
            renderChat();
            
            // Bóng loading
            if(chatBox) {
                chatBox.insertAdjacentHTML('beforeend', '<div id="loading" class="sys-thinking"><div class="sys-spinner"></div><span style="color:#4CC9F0; font-size:12px; font-style:italic;">Não nảy số rẹt rẹt...</span></div>');
                scrollToBottom();
            }
            
            try {
                let responseText = "";
                const isOR = currentModel.includes(':free') || currentModel.includes('qwen3-vl');
                const isGem = currentModel.includes('gemini');

                if(isGem) {
                    const key = localStorage.getItem('gemini_api_key') || DEFAULT_GOOGLE_KEY;
                    const res = await fetchWithTimeout(`https://generativelanguage.googleapis.com/v1beta/models/${currentModel}:generateContent?key=${key}`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ contents: [{ parts: [{ text: "Bạn là Mị, AI của Rapaseos. Nói vui vẻ, ngầu, dễ thương.\n" + text }] }] }) });
                    const d = await res.json(); responseText = d?.candidates?.[0]?.content?.parts?.[0]?.text || "Google nghẽn mạng!";
                } else if(isOR) {
                    const key = localStorage.getItem('openrouter_api_key');
                    if(!key) { document.getElementById('loading')?.remove(); alert("Chưa nộp OpenRouter Key! Bấm API Key góc trên nộp nha Sếp! 🔑"); return; }
                    const res = await fetchWithTimeout("https://openrouter.ai/api/v1/chat/completions", { method: "POST", headers: {"Authorization": `Bearer ${key}`, "Content-Type": "application/json"}, body: JSON.stringify({ model: currentModel, messages: [{role:"system", content:"Bạn là Mị, AI của Rapaseos."}, {role:"user", content:text}] }) });
                    const d = await res.json(); responseText = d?.choices?.[0]?.message?.content || "Lỗi OpenRouter!";
                } else {
                    const key = localStorage.getItem('groq_api_key');
                    if(!key) { document.getElementById('loading')?.remove(); alert("Sếp nạp thuế Groq API Key vào góc trên màn hình nha! 🐥"); return; }
                    const sys = activeProvider === 'cyh' ? CYH_PROMPT : "Bạn là Mị, AI của Rapaseos.";
                    const res = await fetchWithTimeout("https://api.groq.com/openai/v1/chat/completions", { method: "POST", headers: {"Authorization": `Bearer ${key}`, "Content-Type": "application/json"}, body: JSON.stringify({ model: currentModel, messages: [{role:"system", content:sys}, {role:"user", content:text}] }) });
                    const d = await res.json(); responseText = d?.choices?.[0]?.message?.content || "Lỗi Groq!";
                }
                messages.push({ role: 'assistant', content: responseText });
            } catch (e) {
                messages.push({ role: 'assistant', content: `🚨 Lỗi rồi: ${e.message}` });
            }
            
            document.getElementById('loading')?.remove();
            renderChat();
        }

        // Hỗ trợ TouchEnd + Click để trị bệnh liệt cảm ứng của Acode
        if(btnSendHome && inpHome) {
            const hndl1 = (e) => { e.preventDefault(); processMessage(inpHome.value.trim()); inpHome.value=''; };
            btnSendHome.addEventListener('click', hndl1);
            btnSendHome.addEventListener('touchend', hndl1);
            inpHome.addEventListener('keydown', (e) => { if(e.key === 'Enter') { e.preventDefault(); processMessage(inpHome.value.trim()); inpHome.value=''; } });
        }
        if(btnSendChat && inpChat) {
            const hndl2 = (e) => { e.preventDefault(); processMessage(inpChat.value.trim()); inpChat.value=''; };
            btnSendChat.addEventListener('click', hndl2);
            btnSendChat.addEventListener('touchend', hndl2);
            inpChat.addEventListener('keydown', (e) => { if(e.key === 'Enter') { e.preventDefault(); processMessage(inpChat.value.trim()); inpChat.value=''; } });
        }


        // --- 6. HOẠT ẢNH HẠT BỤI TỪ G-II (BẢO LƯU 1000% NỀN ĐỘNG) ---
        (function(){
            const canvas = document.getElementById('hero-particles');
            if(!canvas) return;
            const ctx = canvas.getContext('2d', { alpha: true });
            let W, H, particles = [];
            const isMobile = /Mobi|Android/i.test(navigator.userAgent);
            
            const LAYERS = [
                {count: isMobile?5:15, r:[0.5,1.2], vy:[-0.05,-0.15], alpha:[0.15,0.30]},
                {count: isMobile?5:18, r:[1.5,2.5], vy:[-0.15,-0.35], alpha:[0.30,0.60]},
                {count: isMobile?3:10,  r:[2.8,4.5], vy:[-0.30,-0.70], alpha:[0.60,0.95]} 
            ];

            function resize(){
                const bgHero = document.querySelector('.bg-hero');
                if(!bgHero) return;
                W = canvas.width = bgHero.clientWidth * devicePixelRatio;
                H = canvas.height = bgHero.clientHeight * devicePixelRatio;
                ctx.scale(devicePixelRatio, devicePixelRatio);
            }

            function rand(min,max){ return Math.random()*(max-min)+min; }

            function makeParticle(layer){
                return {
                    x: rand(0, canvas.width / devicePixelRatio),
                    y: rand((canvas.height / devicePixelRatio)*0.5, (canvas.height / devicePixelRatio)*1.2),
                    r: rand(layer.r[0], layer.r[1]),
                    vy: rand(layer.vy[0], layer.vy[1]),
                    vx: rand(-0.15, 0.15),
                    alphaBase: rand(layer.alpha[0], layer.alpha[1]),
                    layerRef: layer 
                };
            }

            function init(){
                resize(); particles = [];
                LAYERS.forEach(layer => { for(let i = 0; i < layer.count; i++){ particles.push(makeParticle(layer)); } });
                window.addEventListener('resize', () => { clearTimeout(window._resizeTimeout); window._resizeTimeout = setTimeout(resize, 120); });
                requestAnimationFrame(loop);
            }

            function loop(){
                const w = canvas.width / devicePixelRatio; const h = canvas.height / devicePixelRatio; ctx.clearRect(0,0,w, h);
                particles.forEach((p, i) => {
                    p.x += p.vx; p.y += p.vy;
                    const pulse = Math.sin(Date.now() / 1000 + p.x) * 0.2; const alpha = Math.max(0, Math.min(1, p.alphaBase + pulse));
                    if (p.r > 2.5) { ctx.beginPath(); ctx.fillStyle = `rgba(255,255,255,${alpha * 0.15})`; ctx.arc(p.x, p.y, p.r*4, 0, Math.PI*2); ctx.fill(); }
                    ctx.beginPath(); ctx.fillStyle = `rgba(255,255,255,${alpha.toFixed(2)})`; ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
                    if(p.y < -10 || p.x < -20 || p.x > w + 20){ particles[i] = makeParticle(p.layerRef); particles[i].y = h + rand(5, 40); }
                });
                requestAnimationFrame(loop);
            }
            setTimeout(init, 100);
        })();

        // Bật chat nếu có API Key
        window.onload = () => {
            if (localStorage.getItem('groq_api_key') || localStorage.getItem('gemini_api_key') || localStorage.getItem('openrouter_api_key')) {
                goTab('chat');
            } else {
                goTab('home');
            }
        }
    </script>
</body>
